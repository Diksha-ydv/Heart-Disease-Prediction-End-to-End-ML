<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-danger text-white text-center">
<h2>❤️ Heart Disease Prediction</h2>
</div>

<div class="card-body">

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="mb-3">
    <label class="form-label">Age</label>
    <input
        type="number"
        class="form-control"
        name="Age"
        min="18"
        max="100"
        placeholder="18 - 100"
        required>
</div>

<div class="mb-3">
<label>Sex</label>
<select class="form-select" name="Sex" required>
<option value="">Select</option>
<option value="M">Male</option>
<option value="F">Female</option>
</select>
</div>

<div class="mb-3">
<label>Chest Pain Type</label>
<select class="form-select" name="ChestPainType" required>
<option value="">Select</option>
<option value="ATA">ATA</option>
<option value="NAP">NAP</option>
<option value="ASY">ASY</option>
<option value="TA">TA</option>
</select>
</div>

<div class="mb-3">
    <label class="form-label">Resting Blood Pressure (mm Hg)</label>
    <input
        type="number"
        class="form-control"
        name="RestingBP"
        min="80"
        max="220"
        placeholder="80 - 220"
        required>
</div>

<div class="mb-3">
    <label class="form-label">Cholesterol (mg/dL)</label>
    <input
        type="number"
        class="form-control"
        name="Cholesterol"
        min="0"
        max="700"
        placeholder="0 - 700"
        required>
</div>

<div class="mb-3">
<label>Fasting Blood Sugar</label>
<select class="form-select" name="FastingBS" required>
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="mb-3">
<label>Resting ECG</label>
<select class="form-select" name="RestingECG" required>
<option value="Normal">Normal</option>
<option value="ST">ST</option>
<option value="LVH">LVH</option>
</select>
</div>

<div class="mb-3">
    <label class="form-label">Maximum Heart Rate</label>
    <input
        type="number"
        class="form-control"
        name="MaxHR"
        min="60"
        max="220"
        placeholder="60 - 220"
        required>
</div>


<div class="mb-3">
<label>Exercise Induced Angina</label>
<select class="form-select" name="ExerciseAngina" required>
<option value="N">No</option>
<option value="Y">Yes</option>
</select>
</div>

<div class="mb-3">
    <label class="form-label">Oldpeak</label>
    <input
        type="number"
        class="form-control"
        name="Oldpeak"
        min="-2.5"
        max="7"
        step="0.1"
        placeholder="-2.5 to 7.0"
        required>
</div>

<div class="mb-3">
<label>ST Slope</label>
<select class="form-select" name="ST_Slope" required>
<option value="Up">Up</option>
<option value="Flat">Flat</option>
<option value="Down">Down</option>
</select>
</div>

<div class="d-grid">
<button class="btn btn-danger" type="submit">
Predict
</button>
</div>

</form>

{% if results is not none %}

<div class="container mt-4">

    <h3>
        Prediction: {{ results }}
    </h3>


    {% if results == "High Risk of Heart Disease" %}

        <h3 class="text-danger">
            ❤️ High Risk of Heart Disease
        </h3>

    {% else %}

        <h3 class="text-success">
            💚 Low Risk of Heart Disease
        </h3>

    {% endif %}

</div>

{% endif %}

</body>
</html>
